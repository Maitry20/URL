<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnipLink - Sign In</title>
    <!-- Google Fonts: Inter and Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- HTMX JSON encoding extension -->
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: 'var(--bg)',
                            card: 'var(--card)',
                            border: 'var(--border)',
                            primary: 'var(--primary)',
                            secondary: 'var(--secondary)',
                            accent: 'var(--accent)',
                            text: 'var(--text)'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #030712;
            --card: #0f172a;
            --border: #1e293b;
            --primary: #6366f1;
            --secondary: #06b6d4;
            --accent: #a855f7;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(3, 7, 18, 0.6);
            --blob-1: rgba(99, 102, 241, 0.15);
            --blob-2: rgba(168, 85, 247, 0.1);
            --btn-secondary-bg: #0f172a;
            --btn-secondary-hover: #1e293b;
            --title-from: #ffffff;
            --title-to: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .font-display {
            font-family: 'Outfit', sans-serif;
        }
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request .btn-text {
            display: none;
        }
    </style>
</head>
<body class="text-brand-text min-h-screen flex flex-col justify-between relative">

    <!-- Background Ambient Glows -->
    <div class="absolute top-[-20%] left-[-20%] w-[60vw] h-[60vw] rounded-full bg-[var(--blob-1)] blur-[130px] pointer-events-none z-0 blob-1"></div>
    <div class="absolute bottom-[-20%] right-[-20%] w-[55vw] h-[55vw] rounded-full bg-[var(--blob-2)] blur-[130px] pointer-events-none z-0 blob-2"></div>

    <!-- Toast Container (Top Right for Notifications) -->
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- Simple Header / Back Link -->
    <header class="relative z-10 p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/index.html" class="flex items-center gap-2 group">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-indigo-400 to-pink-400 flex items-center justify-center text-white shadow-md shadow-indigo-200/50 group-hover:scale-105 transition-transform">
                    <i class="fa-solid fa-link text-sm"></i>
                </div>
                <span class="font-display font-bold text-xl bg-gradient-to-r from-[var(--title-from)] to-[var(--title-to)] bg-clip-text text-transparent">SnipLink</span>
            </a>
            <div class="flex items-center gap-3">
                <a href="/index.html" class="text-xs font-semibold text-[var(--text-muted)] hover:text-brand-text transition-colors flex items-center gap-1.5 py-2 px-3 rounded-lg hover:bg-[var(--btn-secondary-hover)] border border-transparent hover:border-brand-border">
                    <i class="fa-solid fa-arrow-left-long"></i> Back to Home
                </a>
            </div>
        </div>
    </header>

    <!-- Center Card -->
    <main class="relative z-10 flex-grow flex items-center justify-center px-6 py-12">
        <div class="auth-card opacity-0 translate-y-8 w-full max-w-md bg-brand-card border border-brand-border rounded-3xl p-8 shadow-xl relative overflow-hidden transition-colors duration-300">
            <!-- Glass header gradient overlay -->
            <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400"></div>

            <div class="mb-8 text-center">
                <h2 class="font-display font-bold text-2xl sm:text-3xl text-brand-text">Welcome Back</h2>
                <p class="text-sm text-[var(--text-muted)] mt-2 font-light">Sign in to manage and shorten your URLs.</p>
            </div>

            <!-- Form -->
            <form id="login-form" 
                  hx-post="/auth/login" 
                  hx-ext="json-enc" 
                  hx-swap="none"
                  hx-on::after-request="handleLoginResponse(event)"
                  class="space-y-5">

                <!-- Email Input -->
                <div class="space-y-2">
                    <label for="email" class="block text-xs font-semibold text-[var(--text-muted)] uppercase tracking-wider">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[var(--text-muted)] text-sm">
                            <i class="fa-regular fa-envelope"></i>
                        </span>
                        <input type="email" 
                               id="email" 
                               name="email" 
                               required 
                               placeholder="john@example.com" 
                               class="w-full pl-11 pr-4 py-3.5 rounded-xl bg-[var(--input-bg)] border border-brand-border focus:border-brand-primary focus:ring-1 focus:ring-brand-primary/35 text-brand-text placeholder-[var(--text-muted)]/60 text-sm outline-none transition-all duration-200">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label for="password" class="block text-xs font-semibold text-[var(--text-muted)] uppercase tracking-wider">Password</label>
                    </div>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[var(--text-muted)] text-sm">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" 
                               id="password" 
                               name="password" 
                               required 
                               placeholder="••••••••" 
                               class="w-full pl-11 pr-4 py-3.5 rounded-xl bg-[var(--input-bg)] border border-brand-border focus:border-brand-primary focus:ring-1 focus:ring-brand-primary/35 text-brand-text placeholder-[var(--text-muted)]/60 text-sm outline-none transition-all duration-200">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                        class="w-full py-4 rounded-xl bg-gradient-to-r from-indigo-500 to-pink-500 hover:from-indigo-400 hover:to-pink-400 text-white font-semibold text-sm shadow-lg shadow-indigo-100 border border-indigo-400/20 transition-all duration-300 hover:shadow-indigo-200/40 hover:scale-[1.01] active:scale-[0.99] flex items-center justify-center gap-2 cursor-pointer">
                    <span class="btn-text">Sign In</span>
                    <span class="htmx-indicator"><i class="fa-solid fa-spinner animate-spin"></i> Authenticating...</span>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-brand-border text-center">
                <p class="text-sm text-[var(--text-muted)]">
                    Don't have an account? 
                    <a href="/register.html" class="text-brand-primary hover:underline font-semibold transition-colors">Sign Up</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 p-6 text-center">
        <p class="text-xs text-[var(--text-muted)] font-light">&copy; 2026 SnipLink. Secured by AWS DynamoDB.</p>
    </footer>

    <!-- Scripts -->
    <script>


        // Check if user is already logged in, redirect to dashboard if yes
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard.html';
        }

        document.addEventListener("DOMContentLoaded", () => {


            // Animate card on page load
            gsap.to(".auth-card", {
                opacity: 1,
                y: 0,
                duration: 0.8,
                ease: "power3.out"
            });

            // Smooth animations for input focus
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('focus', () => {
                    gsap.to(input.parentElement, { scale: 1.01, duration: 0.2 });
                });
                input.addEventListener('blur', () => {
                    gsap.to(input.parentElement, { scale: 1.0, duration: 0.2 });
                });
            });

            // Gentle background blob movements
            gsap.to(".blob-1", { x: "15vw", y: "10vh", duration: 15, repeat: -1, yoyo: true, ease: "sine.inOut" });
            gsap.to(".blob-2", { x: "-15vw", y: "-10vh", duration: 18, repeat: -1, yoyo: true, ease: "sine.inOut" });
        });

        // Toast Notification System
        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-5 py-4 rounded-xl border backdrop-blur-md shadow-lg flex items-center gap-3 pointer-events-auto translate-x-12 opacity-0 text-sm font-medium transition-all duration-300`;
            
            if (type === "success") {
                toast.className += " bg-emerald-50 border-emerald-200 text-emerald-800";
                toast.innerHTML = `<i class="fa-solid fa-circle-check text-base text-emerald-500"></i> <span>${message}</span>`;
            } else {
                toast.className += " bg-rose-50 border-rose-200 text-rose-800";
                toast.innerHTML = `<i class="fa-solid fa-circle-exclamation text-base text-rose-500"></i> <span>${message}</span>`;
            }
            
            container.appendChild(toast);
            
            // GSAP In
            gsap.to(toast, {
                x: 0,
                opacity: 1,
                duration: 0.4,
                ease: "power3.out"
            });
            
            // GSAP Out
            setTimeout(() => {
                gsap.to(toast, {
                    x: 50,
                    opacity: 0,
                    duration: 0.4,
                    ease: "power3.in",
                    onComplete: () => {
                        toast.remove();
                    }
                });
            }, 3000);
        }

        // HTMX Response Handler
        function handleLoginResponse(event) {
            const xhr = event.detail.xhr;
            const status = xhr.status;
            
            if (status === 200) {
                try {
                    const res = JSON.parse(xhr.responseText);
                    
                    // Save JWT token in localStorage
                    localStorage.setItem('token', res.access_token);
                    
                    // Show success toast
                    showToast("Login successful! Welcome back.", "success");
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } catch (e) {
                    showToast("Error processing server response.", "error");
                }
            } else {
                // Failure
                let errorMsg = "Incorrect email or password.";
                try {
                    const res = JSON.parse(xhr.responseText);
                    if (res.detail) {
                        errorMsg = typeof res.detail === 'string' ? res.detail : JSON.stringify(res.detail);
                    }
                } catch (e) {}
                showToast(errorMsg, "error");
            }
        }
    </script>
</body>
</html>
</body>
</html>
